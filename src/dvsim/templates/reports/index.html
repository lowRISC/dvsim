<!DOCTYPE html>
<html lang="en">
       <head>
               <!--
               This index page just redirects to the relevant summary / block result landing page.
               We set a few different metadata to ensure browsers do not cache this index, so that
               we can redirect to a different landing page on subsequent report generations.
               -->
               <meta http-equiv="refresh" content="0; url={{ landing_page }}">
               <meta http-equiv="cache-control" content="no-cache">
               <meta http-equiv="expires" content="0">
               <meta http-equiv="pragma" content="no-cache">
               <title>Simulation Results</title>
       </head>
       <body></body>
</html>
